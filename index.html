<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #f4f1f8; color: #1a1a1a; line-height: 1.5;
  }
  /* ===== 상단 헤더 / 탭 ===== */
  .topbar { background: #602b89; color: #fff; box-shadow: 0 2px 8px rgba(96,43,137,.18); }
  .topbar-inner {
    max-width: 1080px; margin: 0 auto; padding: 0 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
  .brand { font-size: 18px; font-weight: 800; padding: 15px 0; letter-spacing: -.3px; }
  .tabs { display: flex; gap: 2px; }
  .tab {
    background: transparent; border: none; color: #d9c6ee;
    padding: 16px 16px; font-size: 14px; font-weight: 700; cursor: pointer;
    border-bottom: 3px solid transparent; transition: .15s;
  }
  .tab:hover { color: #fff; }
  .tab.active { color: #fff; border-bottom-color: #fff; }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 22px 20px 40px; }
  .panel-view { display: none; }
  .panel-view.active { display: block; }

  h2 { font-size: 19px; color: #602b89; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #666; margin-bottom: 18px; }

  /* ===== 공통 ===== */
  .drop {
    display: block; width: 100%;
    border: 2px dashed #b89cd6; border-radius: 14px; background: #fff;
    padding: 32px 20px; text-align: center; cursor: pointer; transition: .15s; margin-bottom: 16px;
  }
  .drop.hover { border-color: #602b89; background: #f3eef8; }
  .drop .big { font-size: 16px; font-weight: 700; color: #602b89; margin-bottom: 6px; }
  .drop .small { font-size: 13px; color: #888; }
  .drop input { display: none; }
  .btn {
    background: #602b89; color: #fff; border: none; border-radius: 9px;
    padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; transition: .15s;
  }
  .btn:hover { background: #4e2270; }
  .btn:disabled { background: #c4b5d4; cursor: default; }
  .btn.ghost { background: #fff; color: #602b89; border: 1px solid #cdb8e3; }
  .btn.ghost:hover { background: #f3eef8; }
  .privacy { font-size: 12px; color: #aaa; margin-top: 16px; text-align: center; }

  /* ===== 엑셀 정리 ===== */
  .panel { background: #fff; border-radius: 12px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .hidden { display: none; }
  .summary { display: flex; flex-wrap: wrap; gap: 18px; margin-bottom: 14px; }
  .stat { background: #f3eef8; border-radius: 10px; padding: 10px 16px; }
  .stat .n { font-size: 22px; font-weight: 800; color: #602b89; }
  .stat .l { font-size: 12px; color: #777; }
  .controls { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-bottom: 14px; }
  .toggle { display: flex; align-items: center; gap: 7px; font-size: 13px; color: #444; cursor: pointer; user-select: none; }
  .toggle input { width: 16px; height: 16px; accent-color: #602b89; cursor: pointer; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
  .fname { font-size: 13px; color: #888; }
  .fname b { color: #602b89; }
  .table-scroll { overflow-x: auto; border: 1px solid #eee; border-radius: 8px; margin-top: 6px; }
  table { border-collapse: collapse; font-size: 12.5px; white-space: nowrap; width: 100%; }
  th, td { border: 1px solid #ececec; padding: 7px 11px; text-align: left; }
  th { background: #602b89; color: #fff; font-weight: 600; position: sticky; top: 0; }
  tr:nth-child(even) td { background: #faf8fc; }
  .meta { font-size: 12px; color: #999; margin-top: 6px; }
  .warn { background: #fff3e0; border-left: 3px solid #fb8c00; color: #8a4b00; padding: 9px 13px; border-radius: 6px; font-size: 13px; margin-top: 10px; }

  /* ===== 포스터 변환 ===== */
  .bar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px; }
  .count { font-size: 13px; color: #777; }
  .cols { display: flex; gap: 16px; }
  .col { flex: 1; min-width: 0; }
  .col-head {
    font-size: 14px; font-weight: 800; color: #fff; background: #602b89;
    padding: 9px 14px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between;
  }
  .col-head .tag { font-weight: 600; opacity: .85; font-size: 12px; }
  .col-body { background: #fff; border-radius: 0 0 10px 10px; padding: 10px; min-height: 80px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .empty { color: #bbb; font-size: 13px; text-align: center; padding: 20px 0; }
  .card { display: flex; gap: 10px; align-items: center; padding: 8px; border-bottom: 1px solid #f0ecf5; }
  .card:last-child { border-bottom: none; }
  .thumb { width: 52px; height: 52px; object-fit: contain; background: #f7f4fb; border-radius: 6px; flex-shrink: 0; border: 1px solid #eee; }
  .info { flex: 1; min-width: 0; }
  .fn { font-size: 12.5px; font-weight: 600; color: #333; word-break: break-all; }
  .dim { font-size: 11.5px; color: #999; margin-top: 2px; }
  .dl { background: none; border: 1px solid #cdb8e3; color: #602b89; border-radius: 7px; padding: 6px 10px; font-size: 12px; cursor: pointer; flex-shrink: 0; }
  .dl:hover { background: #f3eef8; }

  @media (max-width: 768px){
    .cols { flex-direction: column; }
    .topbar-inner { justify-content: center; }
    .brand { padding-bottom: 0; }
  }

  /* ===== 정산서 도구 (탭3) ===== */
  #panel-settlement .node { background: #fff; border-radius: 14px; box-shadow: 0 1px 5px rgba(0,0,0,0.07); padding: 16px 18px; }
  #panel-settlement .node-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  #panel-settlement .node-title { font-size: 15px; font-weight: 800; color: #602b89; }
  #panel-settlement .node-del { background: none; border: 1px solid #e3c4c4; color: #c0392b; border-radius: 7px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
  #panel-settlement .node-del:hover { background: #fdecea; }
  #panel-settlement .channels { display: flex; gap: 12px; }
  #panel-settlement .channel { flex: 1; min-width: 0; border: 1px solid #ece6f3; border-radius: 10px; padding: 12px; background: #fbfaff; transition: opacity .15s; }
  #panel-settlement .channel.hidden { opacity: .5; }
  #panel-settlement .channel.hidden .ch-name::after { content: " (제외)"; font-size: 11px; color: #999; }
  #panel-settlement .ch-head { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 8px; }
  #panel-settlement .ch-name { font-size: 13px; font-weight: 700; color: #4e2270; }
  #panel-settlement .ch-eye { background: none; border: 1px solid #d9cae8; color: #4e2270; border-radius: 6px; padding: 2px 6px; cursor: pointer; display: inline-flex; align-items: center; flex-shrink: 0; }
  #panel-settlement .ch-eye:hover { background: #f3eef8; }
  #panel-settlement .ch-eye svg { width: 16px; height: 16px; display: block; }
  #panel-settlement .slot { border-radius: 8px; }
  #panel-settlement .slot.hover .ch-drop { border-color: #602b89; background: #f3eef8; }
  #panel-settlement .ch-drop { border: 1.5px dashed #c4aee0; border-radius: 8px; padding: 14px 8px; text-align: center; font-size: 12px; color: #8a76a8; cursor: pointer; background:#fff; min-height: 46px; display:flex; align-items:center; justify-content:center; gap:6px; }
  #panel-settlement .ch-drop.loaded { border-style: solid; border-color: #7fc08a; background: #f1fbf2; color: #2e7d32; font-weight: 600; cursor: move; word-break: break-all; }
  #panel-settlement .ch-drop.loaded.dragging { opacity: .4; }
  #panel-settlement .ch-drop .rm { cursor:pointer; color:#c0392b; border:1px solid #e3c4c4; border-radius:50%; width:17px; height:17px; line-height:15px; text-align:center; font-size:11px; background:#fff; flex-shrink:0; }
  #panel-settlement .ch-drop .rm:hover { background:#fdecea; }
  #panel-settlement .map-summary { font-size: 11.5px; margin-top: 8px; color:#666; }
  #panel-settlement .map-summary .ok { color:#2e7d32; font-weight:600; }
  #panel-settlement .map-summary .bad { color:#c0392b; font-weight:600; }
  #panel-settlement .map-summary a { color:#602b89; cursor:pointer; text-decoration:underline; margin-left:6px; }
  #panel-settlement .map-row { margin-top: 6px; font-size: 11.5px; color: #666; }
  #panel-settlement .map-row.collapsed { display:none; }
  #panel-settlement .map-row label { display: flex; align-items: center; gap: 4px; margin-top: 5px; }
  #panel-settlement .map-row span { width: 42px; flex-shrink: 0; color:#888; }
  #panel-settlement .map-row select { flex: 1; min-width: 0; font-size: 11.5px; padding: 3px 4px; border: 1px solid #ddd; border-radius: 5px; }
  #panel-settlement .ch-info { font-size: 11px; color: #999; margin-top: 6px; }
  #panel-settlement .connector { text-align: center; color: #b89cd6; font-size: 20px; line-height: 1; margin: 4px 0; }
  #panel-settlement .add-row { text-align: center; margin: 14px 0; }
  #panel-settlement .btn.sm { padding: 7px 14px; font-size: 13px; }
  #panel-settlement .out-head { background: #602b89; color: #fff; border-radius: 14px 14px 0 0; padding: 12px 18px; font-size: 15px; font-weight: 800; }
  #panel-settlement .out-body { background: #fff; border-radius: 0 0 14px 14px; box-shadow: 0 1px 5px rgba(0,0,0,0.07); padding: 16px 18px; }
  #panel-settlement .out-controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 12px; }
  #panel-settlement .table-scroll { overflow-x: auto; border: 1px solid #eee; border-radius: 8px; }
  #panel-settlement table { border-collapse: collapse; font-size: 12.5px; width: 100%; white-space: nowrap; }
  #panel-settlement th, #panel-settlement td { border: 1px solid #ececec; padding: 7px 11px; text-align: right; vertical-align: middle; position: static; }
  #panel-settlement th { background: #602b89; color: #fff; font-weight: 600; text-align: center; }
  #panel-settlement td.l, #panel-settlement th.l { text-align: left; }
  #panel-settlement td.c { text-align: center; }
  #panel-settlement tr:nth-child(even) td { background: #faf8fc; }
  #panel-settlement tr.total td { background: #f3eef8 !important; font-weight: 800; color: #602b89; }
  #panel-settlement .empty { color: #bbb; font-size: 13px; text-align: center; padding: 24px 0; }
  #panel-settlement .privacy { font-size: 12px; color: #aaa; margin-top: 18px; text-align: center; }
  #panel-settlement .merge { margin-top: 18px; border-top: 1px dashed #e3d9ef; padding-top: 14px; }
  #panel-settlement .merge h3 { font-size: 14px; color: #602b89; margin-bottom: 3px; }
  #panel-settlement .merge .note { font-size: 12px; color: #888; margin-bottom: 10px; }
  #panel-settlement .merge-list { display: flex; flex-direction: column; gap: 3px; max-height: 260px; overflow: auto; border: 1px solid #eee; border-radius: 8px; padding: 8px; }
  #panel-settlement .merge-item { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 5px 7px; border-radius: 6px; cursor: pointer; }
  #panel-settlement .merge-item.sim { background: #faf4ff; }
  #panel-settlement .merge-item:hover { background: #f3eef8; }
  #panel-settlement .merge-item .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; background: transparent; }
  #panel-settlement .merge-item .nm { word-break: break-all; }
  #panel-settlement .merge-item .cnt { color: #999; font-size: 12px; margin-left: auto; flex-shrink: 0; }
  #panel-settlement .merge-item input { accent-color: #602b89; width:15px; height:15px; flex-shrink:0; }
  #panel-settlement .merge-ctrl { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
  #panel-settlement .merge-ctrl input[type=text]{ flex: 1; min-width: 180px; padding: 8px 11px; border: 1px solid #ccc; border-radius: 7px; font-size: 13px; }
  #panel-settlement .rules { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  #panel-settlement .rule { font-size: 12.5px; background: #f3eef8; border-radius: 7px; padding: 7px 11px; display: flex; align-items: center; gap: 8px; }
  #panel-settlement .rule .arrow { color:#888; }
  #panel-settlement .rule b { color: #602b89; }
  #panel-settlement .rule .undo { margin-left: auto; cursor: pointer; color: #c0392b; border: 1px solid #e3c4c4; border-radius: 6px; padding: 2px 9px; font-size: 11.5px; background: #fff; flex-shrink:0; }
  #panel-settlement .rule .undo:hover { background: #fdecea; }
  #panel-settlement .sim-hint { font-size: 11.5px; color: #a35bce; margin-left: 4px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">엔티켓 업무 도구</div>
    <nav class="tabs">
      <button class="tab active" data-tab="excel">예매자 명단 정리</button>
      <button class="tab" data-tab="poster">이미지 변환</button>
      <button class="tab" data-tab="settlement">공연 정산서</button>
    </nav>
  </div>
</div>

<div class="wrap">

  <!-- ============ 탭 1: 예매자 명단 정리 ============ -->
  <section class="panel-view active" id="panel-excel">
    <h2>예매자 명단 정리</h2>

    <label class="drop" id="xlDrop">
      <div class="big">📂 예매자 명단 파일 넣기</div>
      <div class="small">여기에 끌어다 놓거나 클릭해서 선택</div>
      <input type="file" id="xlFile" accept=".xls,.xlsx" />
    </label>

    <div class="panel hidden" id="xlResult">
      <div class="summary" id="xlSummary"></div>
      <div class="controls">
        <label class="toggle"><input type="checkbox" id="xlMask"> 연락처 가운데 가리기</label>
      </div>
      <div class="btn-row">
        <button class="btn" id="xlDownload">정리본 엑셀 다운로드</button>
        <button class="btn ghost" id="xlReset">초기화</button>
        <span class="fname" id="xlFname"></span>
      </div>
      <div id="xlWarn"></div>
      <div class="table-scroll" id="xlTable"></div>
      <div class="meta" id="xlMeta"></div>
      <div class="privacy"></div>
    </div>
  </section>

  <!-- ============ 탭 2: 포스터 이미지 변환 ============ -->
  <section class="panel-view" id="panel-poster">
    <h2>이미지 변환</h2>

    <label class="drop" id="imDrop">
      <div class="big">📂 이미지 넣기</div>
      <div class="small">여러 장 한꺼번에 끌어다 놓거나 클릭해서 선택 (JPG · PNG 등)</div>
      <input type="file" id="imFile" accept="image/*" multiple />
    </label>

    <div class="bar">
      <button class="btn ghost" id="imClear" disabled>초기화</button>
      <span class="count" id="imCount"></span>
    </div>

    <div class="cols">
      <div class="col">
        <div class="col-head"><span>238px</span><span class="tag">가로 238 고정</span></div>
        <div class="col-body" id="imCol238"><div class="empty">변환 결과가 여기 표시됩니다</div></div>
      </div>
      <div class="col">
        <div class="col-head"><span>650px</span><span class="tag">가로 650 고정</span></div>
        <div class="col-body" id="imCol650"><div class="empty">변환 결과가 여기 표시됩니다</div></div>
      </div>
    </div>
    <div class="privacy"></div>
  </section>

  <!-- ============ 탭 3: 정산서 도구 ============ -->
  <section class="panel-view" id="panel-settlement">
    <h2>공연 정산서</h2>
    <div id="sessions"></div>
    <div class="add-row">
      <button class="btn ghost" id="addSession">＋ 회차 추가</button>
    </div>
    <div class="connector">▼</div>
    <div class="out-head"></div>
    <div class="out-body">
      <div class="out-controls">
        <button class="btn" id="dlBtn" disabled>엑셀 다운로드</button>
      </div>
      <div id="output"><div class="empty">파일을 넣으면 정산표가 자동으로 만들어집니다.</div></div>
      <div id="merge"></div>
    </div>
    <div class="privacy"></div>
  </section>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
/* ===== 탭 전환 ===== */
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".panel-view").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    document.getElementById("panel-"+t.dataset.tab).classList.add("active");
  });
});

/* ===== 도구 1: 예매자 명단 정리 ===== */
(function(){
  const TARGET_COLS=["공연명","공연일","공연시간","좌석등급","권종","좌석명","관람자명","연락처","예매번호"];
  const drop=document.getElementById("xlDrop");
  const input=document.getElementById("xlFile");
  const resultPanel=document.getElementById("xlResult");
  const summaryEl=document.getElementById("xlSummary");
  const tableBox=document.getElementById("xlTable");
  const previewMeta=document.getElementById("xlMeta");
  const warnBox=document.getElementById("xlWarn");
  const downloadBtn=document.getElementById("xlDownload");
  const fnameLabel=document.getElementById("xlFname");
  const sortSeatChk=document.getElementById("xlSortSeat");
  const sortNameChk=document.getElementById("xlSortName");
  const maskPhoneChk=document.getElementById("xlMask");

  let processedRows=[];
  let outFilename="예매자명단_정리본.xlsx";

  const esc=s=>s==null?"":String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const norm=s=>String(s==null?"":s).replace(/\s+/g,"").trim();
  const pad=n=>String(n).padStart(2,"0");

  function fmtDate(v){
    if(v==null) return "";
    if(v instanceof Date && !isNaN(v)) return `${v.getFullYear()}-${pad(v.getMonth()+1)}-${pad(v.getDate())}`;
    let s=String(v).trim(); if(!s) return ""; let m;
    m=s.match(/^(\d{4})[-./](\d{1,2})[-./](\d{1,2})/); if(m) return `${m[1]}-${pad(m[2])}-${pad(m[3])}`;
    m=s.match(/^(\d{1,2})[-./](\d{1,2})[-./](\d{4})/); if(m) return `${m[3]}-${pad(m[1])}-${pad(m[2])}`;
    m=s.match(/^(\d{1,2})[-./](\d{1,2})[-./](\d{2})$/); if(m) return `20${m[3]}-${pad(m[1])}-${pad(m[2])}`;
    const d=new Date(s); if(!isNaN(d)) return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    return s;
  }
  function fmtTime(v){
    if(v==null) return "";
    if(v instanceof Date && !isNaN(v)) return `${pad(v.getHours())}:${pad(v.getMinutes())}`;
    let s=String(v).trim(); if(!s) return ""; let m;
    m=s.match(/^(\d{1,2}):(\d{2})\s*(AM|PM|오전|오후)$/i);
    if(m){ let h=parseInt(m[1],10)%12; if(/PM|오후/i.test(m[3])) h+=12; return `${pad(h)}:${m[2]}`; }
    m=s.match(/^(\d{1,2}):(\d{2})/); if(m) return `${pad(m[1])}:${m[2]}`;
    return s;
  }
  function parseSeat(s){
    s=String(s||"");
    const f=s.match(/(\d+)\s*층/), c=s.match(/([A-Za-z가-힣]+)\s*열/), n=s.match(/(\d+)\s*번/);
    return { floor:f?parseInt(f[1],10):9999, col:c?c[1]:"", num:n?parseInt(n[1],10):9999 };
  }
  function seatCompare(a,b){
    const pa=parseSeat(a["좌석명"]), pb=parseSeat(b["좌석명"]);
    if(pa.floor!==pb.floor) return pa.floor-pb.floor;
    if(pa.col!==pb.col) return pa.col.localeCompare(pb.col,"ko");
    return pa.num-pb.num;
  }
  const maskPhone=v=>String(v||"").replace(/(\d{2,3})[-\s]?(\d{3,4})[-\s]?(\d{4})/,(m,a,b,c)=>`${a}-${"*".repeat(b.length)}-${c}`);

  function handleFile(file){
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array",cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
        if(rows.length<2){ alert("데이터가 없는 파일이에요."); drop.style.display=""; return; }
        const headers=rows[0].map(h=>norm(h));
        const colIndex={}, missing=[];
        TARGET_COLS.forEach(name=>{ const idx=headers.indexOf(norm(name)); if(idx===-1) missing.push(name); else colIndex[name]=idx; });
        processedRows=[];
        for(let r=1;r<rows.length;r++){
          const row=rows[r];
          if(!row || row.every(c=>String(c).trim()==="")) continue;
          const get=name=>(colIndex[name]!==undefined ? (row[colIndex[name]] ?? "") : "");
          const obj={}; TARGET_COLS.forEach(name=>{ obj[name]=get(name); });
          obj["공연일"]=fmtDate(obj["공연일"]);
          obj["공연시간"]=fmtTime(obj["공연시간"]);
          TARGET_COLS.forEach(name=>{
            if(name!=="공연일" && name!=="공연시간"){
              const v=obj[name]; obj[name]=(v instanceof Date)?fmtDate(v):(v==null?"":String(v));
            }
          });
          processedRows.push(obj);
        }
        const showName=processedRows.length?String(processedRows[0]["공연명"]||"").trim():"";
        outFilename=(showName?showName+"_예매자명단":"예매자명단_정리본")+".xlsx";
        warnBox.innerHTML=missing.length
          ? `<div class="warn">다음 컬럼을 원본에서 못 찾았어요: <b>${missing.map(esc).join(", ")}</b> · 해당 칸은 비워둡니다. 원본 헤더 이름이 바뀌었는지 확인해 주세요.</div>` : "";
        resultPanel.classList.remove("hidden");
        render();
      }catch(err){ alert("파일을 읽는 중 오류가 났어요: "+(err.message||err)); drop.style.display=""; }
    };
    reader.readAsArrayBuffer(file);
  }

  function getViewRows(){
    let rows=processedRows.map(r=>({...r}));
    rows.sort((a,b)=>String(a["관람자명"]||"").localeCompare(String(b["관람자명"]||""),"ko"));
    if(maskPhoneChk.checked) rows=rows.map(r=>({...r,"연락처":maskPhone(r["연락처"])}));
    return rows;
  }
  function render(){
    const rows=getViewRows();
    const sessions=new Set(rows.map(r=>`${r["공연일"]} ${r["공연시간"]}`.trim())).size;
    summaryEl.innerHTML=`
      <div class="stat"><div class="n">${rows.length}</div><div class="l">총 좌석/건수</div></div>
      <div class="stat"><div class="n">${sessions}</div><div class="l">회차 수</div></div>`;
    const preview=rows.slice(0,30);
    let html="<table><tr>"+TARGET_COLS.map(c=>`<th>${esc(c)}</th>`).join("")+"</tr>";
    preview.forEach(r=>{ html+="<tr>"+TARGET_COLS.map(c=>`<td>${esc(r[c])}</td>`).join("")+"</tr>"; });
    html+="</table>";
    tableBox.innerHTML=html;
    previewMeta.textContent=rows.length>30?`미리보기 30행 표시 · 전체 ${rows.length}행은 다운로드 파일에 포함됩니다.`:`전체 ${rows.length}행`;
    fnameLabel.innerHTML=`저장 파일명: <b>${esc(outFilename)}</b>`;
  }
  function download(){
    const rows=getViewRows();
    const aoa=[TARGET_COLS, ...rows.map(r=>TARGET_COLS.map(c=>r[c]))];
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws["!cols"]=[{wch:18},{wch:12},{wch:9},{wch:9},{wch:10},{wch:16},{wch:10},{wch:15},{wch:12}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"예매자명단");
    XLSX.writeFile(wb,outFilename);
  }

  input.addEventListener("change",e=>{ if(e.target.files[0]){ drop.style.display="none"; handleFile(e.target.files[0]); } });
  ["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("hover");}));
  ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("hover");}));
  drop.addEventListener("drop",e=>{ e.preventDefault(); if(e.dataTransfer.files[0]){ drop.style.display="none"; handleFile(e.dataTransfer.files[0]); } });
  maskPhoneChk.addEventListener("change",render);
  downloadBtn.addEventListener("click",download);
  document.getElementById("xlReset").addEventListener("click",()=>{
    processedRows=[]; outFilename="예매자명단_정리본.xlsx";
    resultPanel.classList.add("hidden");
    drop.style.display="";
    summaryEl.innerHTML=""; tableBox.innerHTML=""; previewMeta.textContent=""; warnBox.innerHTML=""; fnameLabel.innerHTML="";
    maskPhoneChk.checked=false;
    input.value="";
  });
})();

/* ===== 도구 2: 포스터 이미지 변환 ===== */
(function(){
  const TARGETS=[238,650];
  const MAX_BYTES=1024*1024;
  const drop=document.getElementById("imDrop");
  const input=document.getElementById("imFile");
  const col238=document.getElementById("imCol238");
  const col650=document.getElementById("imCol650");
  const clearBtn=document.getElementById("imClear");
  const countEl=document.getElementById("imCount");

  let results=[];
  const usedNames=new Set();

  const esc=s=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const baseName=name=>name.replace(/\.[^.]+$/,"");
  function uniqueName(name){
    let n=name,i=2;
    while(usedNames.has(n)){ n=name.replace(/\.jpg$/i,`_${i}.jpg`); i++; }
    usedNames.add(n); return n;
  }
  function loadImage(file){
    return new Promise((res,rej)=>{
      const url=URL.createObjectURL(file);
      const img=new Image();
      img.onload=()=>{ URL.revokeObjectURL(url); res(img); };
      img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error("이미지 로드 실패")); };
      img.src=url;
    });
  }
  const toBlobAsync=(canvas,type,q)=>new Promise(res=>canvas.toBlob(res,type,q));
  async function encodeUnderLimit(canvas){
    let q=0.92, blob=await toBlobAsync(canvas,"image/jpeg",q);
    while(blob && blob.size>MAX_BYTES && q>0.4){ q-=0.08; blob=await toBlobAsync(canvas,"image/jpeg",q); }
    return blob;
  }
  async function makeVersion(img,targetW,srcName){
    const ratio=targetW/img.width;
    const w=targetW, h=Math.max(1,Math.round(img.height*ratio));
    const canvas=document.createElement("canvas");
    canvas.width=w; canvas.height=h;
    const ctx=canvas.getContext("2d");
    ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality="high";
    ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,w,h);
    ctx.drawImage(img,0,0,w,h);
    const blob=await encodeUnderLimit(canvas);
    const filename=uniqueName(`${targetW}_${baseName(srcName)}.jpg`);
    return { width:targetW, filename, blob, url:URL.createObjectURL(blob), w, h, kb:Math.round(blob.size/1024) };
  }
  async function handleFiles(files){
    const imgs=[...files].filter(f=>f.type.startsWith("image/"));
    if(!imgs.length) return;
    for(const file of imgs){
      try{
        const img=await loadImage(file);
        for(const t of TARGETS){ const r=await makeVersion(img,t,file.name); results.push(r); addCard(r); }
      }catch(e){ console.error(file.name,e); }
    }
    updateBar();
  }
  function addCard(r){
    const target=r.width===238?col238:col650;
    const empty=target.querySelector(".empty"); if(empty) empty.remove();
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img class="thumb" src="${r.url}" alt="">
      <div class="info"><div class="fn">${esc(r.filename)}</div><div class="dim">${r.w}×${r.h}px · ${r.kb}KB</div></div>
      <button class="dl">저장</button>`;
    card.querySelector(".dl").addEventListener("click",()=>downloadOne(r));
    target.appendChild(card);
  }
  function downloadOne(r){
    const a=document.createElement("a");
    a.href=r.url; a.download=r.filename;
    document.body.appendChild(a); a.click(); a.remove();
  }
  function updateBar(){
    const has=results.length>0;
    clearBtn.disabled=!has;
    countEl.textContent=has?`원본 ${results.length/2}장 → 결과 ${results.length}개`:"";
  }
  function clearAll(){
    results.forEach(r=>URL.revokeObjectURL(r.url));
    results=[]; usedNames.clear();
    col238.innerHTML='<div class="empty">변환 결과가 여기 표시됩니다</div>';
    col650.innerHTML='<div class="empty">변환 결과가 여기 표시됩니다</div>';
    updateBar();
  }
  input.addEventListener("change",e=>{ handleFiles(e.target.files); input.value=""; });
  ["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("hover");}));
  ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("hover");}));
  drop.addEventListener("drop",e=>{ e.preventDefault(); if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); });
  clearBtn.addEventListener("click",clearAll);
})();

/* ===== 도구 3: 정산서 도구 ===== */
(function(){
  const CHANNELS=["엔티켓","예술회관","폐쇄몰"];
  const KW={
    권종:["권종","종류","구분","티켓명"],
    가격:["구매가격","판매가격","권종가격","단가","가격","금액"],
    수:["티켓수","판매매수","매수","수량","장수","좌석수","판매수"],
    일:["공연일자","공연일","날짜","일자"],
    시:["공연시간","공연시각","시간","시각"]
  };
  const SIM_COLORS=["#c084e8","#5bb6c4","#e0a23c","#7f8ce0","#d96aa0","#5fae6f"];

  const sessionsEl=document.getElementById("sessions");
  const outputEl=document.getElementById("output");
  const mergeEl=document.getElementById("merge");
  const dlBtn=document.getElementById("dlBtn");

  let sessions=[];
  let seq=0;
  let dragSource=null;
  let mergeMap={};
  let mergeOpen=false;

  const esc=s=>s==null?"":String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const norm=s=>String(s==null?"":s).replace(/\s+/g,"").trim();
  const won=n=>Number(n).toLocaleString("ko-KR");
  const p2=n=>String(n).padStart(2,"0");
  function parseNum(v){ const s=String(v==null?"":v).replace(/[^\d.-]/g,""); const n=parseFloat(s); return isNaN(n)?0:n; }
  function emptyChannel(){ return {name:null,headers:[],rows:[],hidden:false,map:{권종:-1,가격:-1,수:-1,일:-1,시:-1}}; }
  function findSession(sid){ return sessions.find(s=>s.id===sid); }

  const normName=raw=>String(raw==null?"":raw);
  const canonName=raw=>{ const n=normName(raw); return mergeMap[n]||n; };
  const looseKey=name=>normName(name).replace(/[\(\（][^\)\）]*[\)\）]/g,"").replace(/\s/g,"");

  function eyeSVG(open){
    return open
      ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.4 10.4 0 0 1 12 5c7 0 10 7 10 7a13.2 13.2 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.5 13.5 0 0 0 2 12s3 7 10 7a9.7 9.7 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>`;
  }

  function fmtDate(v){
    if(v==null) return "";
    if(v instanceof Date && !isNaN(v)) return `${v.getFullYear()}-${p2(v.getMonth()+1)}-${p2(v.getDate())}`;
    const s=String(v).trim(); if(!s) return ""; let m;
    m=s.match(/^(\d{4})[-./](\d{1,2})[-./](\d{1,2})/); if(m) return `${m[1]}-${p2(m[2])}-${p2(m[3])}`;
    m=s.match(/^(\d{1,2})[-./](\d{1,2})[-./](\d{4})/); if(m) return `${m[3]}-${p2(m[1])}-${p2(m[2])}`;
    m=s.match(/^(\d{1,2})[-./](\d{1,2})[-./](\d{2})$/); if(m) return `20${m[3]}-${p2(m[1])}-${p2(m[2])}`;
    const d=new Date(s); if(!isNaN(d)) return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
    return s;
  }
  function fmtTime(v){
    if(v==null) return "";
    if(v instanceof Date && !isNaN(v)) return `${p2(v.getHours())}:${p2(v.getMinutes())}`;
    const s=String(v).trim(); const m=s.match(/(\d{1,2}):(\d{2})/); return m?`${p2(m[1])}:${m[2]}`:s;
  }

  function findCol(headers, keywords){
    for(const kw of keywords){ const idx=headers.findIndex(h=>norm(h).includes(kw)); if(idx>=0) return idx; }
    return -1;
  }
  function detectHeaderRow(aoa){
    const score=row=>{
      const cells=(row||[]).map(norm); let s=0;
      if(cells.some(c=>KW.권종.some(k=>c.includes(k)))) s++;
      if(cells.some(c=>KW.가격.some(k=>c.includes(k)))) s++;
      if(cells.some(c=>KW.수.some(k=>c.includes(k)))) s++;
      return s;
    };
    const lim=Math.min(aoa.length,15); let best=0,bestScore=-1;
    for(let r=0;r<lim;r++){ const s=score(aoa[r]); if(s>bestScore){ bestScore=s; best=r; } }
    return best;
  }
  function parseWorkbook(buf){
    const wb=XLSX.read(buf,{type:"array",cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
    if(!aoa.length) return null;
    const hr=detectHeaderRow(aoa);
    const headers=(aoa[hr]||[]).map(h=>String(h));
    const rows=aoa.slice(hr+1).filter(r=>r && r.some(c=>String(c).trim()!==""));
    return { headers, rows, map:{
      권종:findCol(headers,KW.권종), 가격:findCol(headers,KW.가격), 수:findCol(headers,KW.수),
      일:findCol(headers,KW.일), 시:findCol(headers,KW.시)
    }};
  }

  function makeSession(){
    const id=++seq; const obj={ id, channels:{} };
    CHANNELS.forEach(ch=>obj.channels[ch]=emptyChannel());
    sessions.push(obj); renderSessions(); recompute();
  }
  function removeSession(id){
    sessions=sessions.filter(s=>s.id!==id);
    if(!sessions.length) makeSession(); else { renderSessions(); recompute(); }
  }
  function moveChannel(src,dst){
    if(src.sid===dst.sid && src.ch===dst.ch) return;
    const ss=findSession(src.sid), ds=findSession(dst.sid);
    if(!ss||!ds) return;
    const tmp=ss.channels[src.ch]; ss.channels[src.ch]=ds.channels[dst.ch]; ds.channels[dst.ch]=tmp;
    renderSessions(); recompute();
  }

  function renderSessions(){
    sessionsEl.innerHTML="";
    sessions.forEach((s,i)=>{
      if(i>0){ const c=document.createElement("div"); c.className="connector"; c.textContent="┃"; sessionsEl.appendChild(c); }
      const node=document.createElement("div");
      node.className="node";
      node.innerHTML=`<div class="node-head"><div class="node-title">회차 ${i+1}</div>
        ${i>0?`<button class="node-del">삭제</button>`:""}</div><div class="channels"></div>`;
      if(i>0) node.querySelector(".node-del").addEventListener("click",()=>removeSession(s.id));
      const chWrap=node.querySelector(".channels");
      CHANNELS.forEach(ch=>chWrap.appendChild(buildChannel(s,ch)));
      sessionsEl.appendChild(node);
    });
  }

  function buildChannel(session, ch){
    const sid=session.id, data=session.channels[ch], loaded=!!data.name;
    const wrap=document.createElement("div");
    wrap.className="channel"+(data.hidden?" hidden":"");
    wrap.innerHTML=`<div class="ch-head"><div class="ch-name">${ch}</div>
        <button class="ch-eye" title="${data.hidden?'정산표에 다시 포함':'검산 시 정산표에서 제외'}">${eyeSVG(!data.hidden)}</button></div>
      <div class="slot"></div>
      <input type="file" accept=".xls,.xlsx" style="display:none">
      <div class="mapwrap"></div>
      <div class="ch-info"></div>`;
    wrap.querySelector(".ch-eye").addEventListener("click",()=>{ data.hidden=!data.hidden; renderSessions(); recompute(); });
    const slot=wrap.querySelector(".slot");
    const input=wrap.querySelector("input");

    function loadFile(file){
      const reader=new FileReader();
      reader.onload=e=>{
        const parsed=parseWorkbook(new Uint8Array(e.target.result));
        if(!parsed){ alert("읽을 데이터가 없어요."); return; }
        data.name=file.name; data.headers=parsed.headers; data.rows=parsed.rows; data.map=parsed.map;
        renderSessions(); recompute();
      };
      reader.readAsArrayBuffer(file);
    }
    input.addEventListener("change",e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); input.value=""; });

    const chip=document.createElement("div");
    chip.className="ch-drop"+(loaded?" loaded":"");
    if(loaded){
      chip.setAttribute("draggable","true");
      chip.innerHTML=`<span>✓ ${esc(data.name)}</span><span class="rm" title="제거">✕</span>`;
      chip.querySelector(".rm").addEventListener("click",ev=>{ ev.stopPropagation(); session.channels[ch]=emptyChannel(); renderSessions(); recompute(); });
      chip.addEventListener("dragstart",e=>{ dragSource={sid,ch}; e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain","move"); chip.classList.add("dragging"); });
      chip.addEventListener("dragend",()=>{ chip.classList.remove("dragging"); dragSource=null; });
    }else{
      chip.textContent="파일 드롭 / 선택";
      chip.addEventListener("click",()=>input.click());
    }
    slot.appendChild(chip);

    ["dragenter","dragover"].forEach(ev=>slot.addEventListener(ev,e=>{ e.preventDefault(); slot.classList.add("hover"); }));
    slot.addEventListener("dragleave",e=>{ if(!slot.contains(e.relatedTarget)) slot.classList.remove("hover"); });
    slot.addEventListener("drop",e=>{
      e.preventDefault(); slot.classList.remove("hover");
      if(e.dataTransfer.files && e.dataTransfer.files.length){ loadFile(e.dataTransfer.files[0]); dragSource=null; }
      else if(dragSource){ moveChannel(dragSource,{sid,ch}); dragSource=null; }
    });

    if(loaded){
      const mapwrap=wrap.querySelector(".mapwrap");
      const ok=data.map.권종>=0 && data.map.가격>=0 && data.map.수>=0;
      const summary=document.createElement("div");
      summary.className="map-summary";
      summary.innerHTML=ok?`<span class="ok">✓ 컬럼 자동 인식됨</span><a class="toggle-map">수정</a>`:`<span class="bad">⚠ 컬럼을 지정해 주세요</span><a class="toggle-map">열기</a>`;
      mapwrap.appendChild(summary);
      const mapRow=document.createElement("div");
      mapRow.className="map-row"+(ok?" collapsed":"");
      [["권종","권종명"],["가격","구매가격"],["수","티켓수"]].forEach(([key,label])=>{
        const lab=document.createElement("label"); lab.innerHTML=`<span>${label}</span>`;
        const sel=document.createElement("select");
        sel.innerHTML=`<option value="-1">(없음)</option>`+data.headers.map((h,idx)=>`<option value="${idx}" ${data.map[key]===idx?"selected":""}>${esc(h||("열"+(idx+1)))}</option>`).join("");
        sel.addEventListener("change",()=>{ data.map[key]=parseInt(sel.value,10); recompute(); updateChInfo(wrap,data); refreshSummary(summary,data); });
        lab.appendChild(sel); mapRow.appendChild(lab);
      });
      mapwrap.appendChild(mapRow);
      summary.querySelector(".toggle-map").addEventListener("click",()=>{
        const collapsed=mapRow.classList.toggle("collapsed");
        const okNow=data.map.권종>=0&&data.map.가격>=0&&data.map.수>=0;
        summary.querySelector(".toggle-map").textContent=collapsed?(okNow?"수정":"열기"):"접기";
      });
      updateChInfo(wrap,data);
    }
    return wrap;
  }

  function refreshSummary(summary,data){
    const ok=data.map.권종>=0 && data.map.가격>=0 && data.map.수>=0;
    summary.querySelector("span").className=ok?"ok":"bad";
    summary.querySelector("span").textContent=ok?"✓ 컬럼 자동 인식됨":"⚠ 컬럼을 지정해 주세요";
  }
  function updateChInfo(wrap,data){
    const info=wrap.querySelector(".ch-info");
    if(data.map.권종<0){ info.textContent="권종명 컬럼을 지정해 주세요."; info.style.color="#c0392b"; return; }
    let cnt=0;
    if(data.map.수>=0) data.rows.forEach(r=>cnt+=parseNum(r[data.map.수])); else cnt=data.rows.length;
    info.textContent=`인식: ${data.rows.length}행 · 합계 ${won(cnt)}장`;
    info.style.color="#999";
  }

  function sessionHasData(s){ return CHANNELS.some(ch=>{ const d=s.channels[ch]; return d.name && d.map.권종>=0 && !d.hidden; }); }

  function sessionDateTime(s){
    for(const ch of CHANNELS){
      const d=s.channels[ch];
      if(!d.name) continue;
      for(const r of d.rows){
        const dt=d.map.일>=0?fmtDate(r[d.map.일]):"";
        const tm=d.map.시>=0?fmtTime(r[d.map.시]):"";
        const combo=(dt+" "+tm).trim();
        if(combo) return combo;
      }
    }
    return "";
  }

  function aggregate(list){
    const map=new Map();
    list.forEach(s=>{
      CHANNELS.forEach(ch=>{
        const d=s.channels[ch];
        if(!d.name || d.map.권종<0 || d.hidden) return;
        d.rows.forEach(r=>{
          const 권종=canonName(r[d.map.권종]);
          if(!권종) return;
          const 가격=d.map.가격>=0?parseNum(r[d.map.가격]):0;
          const 수=d.map.수>=0?parseNum(r[d.map.수]):1;
          const k=권종+"||"+가격;
          if(!map.has(k)) map.set(k,{권종,가격,엔티켓:0,예술회관:0,폐쇄몰:0});
          map.get(k)[ch]+=수;
        });
      });
    });
    return [...map.values()].map(o=>({...o, 합계:o.엔티켓+o.예술회관+o.폐쇄몰}))
      .sort((a,b)=> (b.가격-a.가격) || a.권종.localeCompare(b.권종,"ko"));
  }

  function recompute(){
    window.__stRows=aggregate(sessions);
    renderOutput();
    renderMerge(window.__stRows);
  }

  function renderOutput(){
    const withData=sessions.filter(sessionHasData);
    if(!withData.length){ outputEl.innerHTML='<div class="empty">파일을 넣으면 정산표가 자동으로 만들어집니다.</div>'; dlBtn.disabled=true; return; }
    dlBtn.disabled=false;
    const money=n=>`₩${won(n)}`;
    const dash=v=>v?won(v):"-";
    let thead=`<thead>
      <tr>
        <th rowspan="2">회차</th><th rowspan="2">공연일시</th><th rowspan="2" class="l">권종</th><th rowspan="2">판매(원)</th>
        <th colspan="3">예매처별 판매수(장)</th>
        <th rowspan="2">총판매수(장)</th><th rowspan="2">총판매금액(원)</th>
      </tr>
      <tr><th>엔티켓</th><th>예술회관</th><th>폐쇄몰</th></tr>
    </thead>`;
    let body=""; let g={엔티켓:0,예술회관:0,폐쇄몰:0,합계:0,금액:0};
    withData.forEach(s=>{
      const idx=sessions.indexOf(s)+1;
      const dt=sessionDateTime(s);
      const rows=aggregate([s]);
      if(!rows.length) return;
      rows.forEach((r,ri)=>{
        const amt=r.가격*r.합계;
        g.엔티켓+=r.엔티켓; g.예술회관+=r.예술회관; g.폐쇄몰+=r.폐쇄몰; g.합계+=r.합계; g.금액+=amt;
        body+="<tr>";
        if(ri===0){ body+=`<td class="c" rowspan="${rows.length}">${idx}</td><td class="c" rowspan="${rows.length}">${esc(dt)}</td>`; }
        body+=`<td class="l">${esc(r.권종)}</td><td>${money(r.가격)}</td>`;
        body+=`<td>${dash(r.엔티켓)}</td><td>${dash(r.예술회관)}</td><td>${dash(r.폐쇄몰)}</td>`;
        body+=`<td>${won(r.합계)}</td><td>${money(amt)}</td></tr>`;
      });
    });
    let total=`<tr class="total"><td colspan="4">계</td><td>${dash(g.엔티켓)}</td><td>${dash(g.예술회관)}</td><td>${dash(g.폐쇄몰)}</td><td>${won(g.합계)}</td><td>${money(g.금액)}</td></tr>`;
    outputEl.innerHTML=`<div class="table-scroll"><table>${thead}<tbody>${body}${total}</tbody></table></div>`;
  }

  function renderMerge(rows){
    if(!rows.length){ mergeEl.innerHTML=""; return; }
    const counts=new Map();
    rows.forEach(r=>counts.set(r.권종,(counts.get(r.권종)||0)+r.합계));
    const names=[...counts.keys()];
    const byLoose=new Map();
    names.forEach(n=>{ const k=looseKey(n); (byLoose.get(k)||byLoose.set(k,[]).get(k)).push(n); });
    const simColor=new Map(); let ci=0;
    byLoose.forEach(arr=>{ if(arr.length>1){ const col=SIM_COLORS[ci++%SIM_COLORS.length]; arr.forEach(n=>simColor.set(n,col)); } });
    const sorted=names.slice().sort((a,b)=>{
      const ca=simColor.has(a)?0:1, cb=simColor.has(b)?0:1;
      if(ca!==cb) return ca-cb;
      return looseKey(a).localeCompare(looseKey(b),"ko") || a.localeCompare(b,"ko");
    });
    const hasSim=simColor.size>0;
    const ruleCount=Object.keys(mergeMap).filter(k=>mergeMap[k]!==k).length;
    const simCount=simColor.size;
    const sub=`${names.length}개 항목`+(simCount?` · 유사 후보 ${simCount}개`:"")+(ruleCount?` · 병합규칙 ${ruleCount}개`:"");
    let html=`<div class="merge">
      <h3 class="merge-toggle" style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:8px">
        <span class="chev" style="display:inline-block;transition:.15s;transform:rotate(${mergeOpen?90:0}deg)">▸</span>
        권종명 정리 <span style="font-weight:400;font-size:12px;color:#999">${sub}</span>
      </h3>
      <div class="merge-body" style="display:${mergeOpen?'block':'none'}">
      <div class="note">권종명이 다르게 인식된 항목을 직접 골라 합칩니다. ${hasSim?'<b style="color:#a35bce">색이 표시된 유사 후보</b>가 ':''}먼저 모여 있어요. (정산 정확도를 위해 자동 병합하지 않습니다.)</div>
      <div class="merge-list">`;
    sorted.forEach(n=>{
      const col=simColor.get(n);
      html+=`<label class="merge-item ${col?'sim':''}">
        <input type="checkbox" class="mg-chk" value="${esc(n)}" data-cnt="${counts.get(n)}">
        <span class="dot" style="background:${col||'transparent'}"></span>
        <span class="nm">${esc(n)}</span>
        ${col?'<span class="sim-hint">유사</span>':''}
        <span class="cnt">${won(counts.get(n))}장</span>
      </label>`;
    });
    html+=`</div>
      <div class="merge-ctrl">
        <input type="text" id="mgCanon" placeholder="합칠 항목 2개 이상 선택 → 대표 권종명">
        <button class="btn sm" id="mgApply" disabled>선택 병합</button>
      </div>
      <div class="rules" id="mgRules"></div>
      </div>
    </div>`;
    mergeEl.innerHTML=html;
    mergeEl.querySelector(".merge-toggle").addEventListener("click",()=>{
      mergeOpen=!mergeOpen;
      mergeEl.querySelector(".merge-body").style.display=mergeOpen?"block":"none";
      mergeEl.querySelector(".chev").style.transform=`rotate(${mergeOpen?90:0}deg)`;
    });
    const chks=[...mergeEl.querySelectorAll(".mg-chk")];
    const canon=mergeEl.querySelector("#mgCanon");
    const applyBtn=mergeEl.querySelector("#mgApply");
    function onChange(){
      const sel=chks.filter(c=>c.checked);
      applyBtn.disabled=sel.length<2;
      if(sel.length>=2){
        const top=sel.slice().sort((a,b)=>(+b.dataset.cnt)-(+a.dataset.cnt))[0];
        if(!canon.value || !sel.some(c=>c.value===canon.value)) canon.value=top.value;
      }
    }
    chks.forEach(c=>c.addEventListener("change",onChange));
    applyBtn.addEventListener("click",()=>{
      const sel=chks.filter(c=>c.checked).map(c=>c.value);
      const C=normName(canon.value||sel[0]);
      if(!C || sel.length<2) return;
      sel.forEach(s=>{ mergeMap[normName(s)]=C; });
      const selNorm=sel.map(normName);
      Object.keys(mergeMap).forEach(k=>{ if(selNorm.includes(mergeMap[k])) mergeMap[k]=C; });
      recompute();
    });
    renderRules();
  }

  function renderRules(){
    const box=mergeEl.querySelector("#mgRules");
    if(!box) return;
    const groups={};
    Object.entries(mergeMap).forEach(([src,c])=>{ if(src!==c){ (groups[c]=groups[c]||[]).push(src); } });
    const keys=Object.keys(groups);
    if(!keys.length){ box.innerHTML=""; return; }
    box.innerHTML=keys.map(c=>{
      const srcs=groups[c].map(esc).join(", ");
      return `<div class="rule"><span>${srcs}</span><span class="arrow">→</span><b>${esc(c)}</b><span class="undo" data-canon="${esc(c)}">해제</span></div>`;
    }).join("");
    box.querySelectorAll(".undo").forEach(u=>u.addEventListener("click",()=>{
      const c=u.dataset.canon;
      Object.keys(mergeMap).forEach(k=>{ if(mergeMap[k]===c) delete mergeMap[k]; });
      recompute();
    }));
  }

  function download(){
    const withData=sessions.filter(sessionHasData);
    if(!withData.length) return;
    const dash=v=>v?v:"-";
    const aoa=[["회차","공연일시","권종","판매(원)","엔티켓","예술회관","폐쇄몰","총판매수","총판매금액"]];
    let g={엔티켓:0,예술회관:0,폐쇄몰:0,합계:0,금액:0};
    withData.forEach(s=>{
      const idx=sessions.indexOf(s)+1;
      const dt=sessionDateTime(s);
      const rows=aggregate([s]);
      rows.forEach((r,ri)=>{
        const amt=r.가격*r.합계;
        g.엔티켓+=r.엔티켓; g.예술회관+=r.예술회관; g.폐쇄몰+=r.폐쇄몰; g.합계+=r.합계; g.금액+=amt;
        aoa.push([ ri===0?idx:"", ri===0?dt:"", r.권종, r.가격, dash(r.엔티켓), dash(r.예술회관), dash(r.폐쇄몰), r.합계, amt ]);
      });
    });
    aoa.push(["계","","","",dash(g.엔티켓),dash(g.예술회관),dash(g.폐쇄몰),g.합계,g.금액]);
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws["!cols"]=[{wch:5},{wch:17},{wch:20},{wch:11},{wch:8},{wch:9},{wch:8},{wch:10},{wch:13}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"정산표");
    const d=new Date(); const stamp=`${d.getFullYear()}${p2(d.getMonth()+1)}${p2(d.getDate())}`;
    XLSX.writeFile(wb,`정산표_${stamp}.xlsx`);
  }

  document.getElementById("addSession").addEventListener("click",makeSession);
  dlBtn.addEventListener("click",download);
  makeSession();
})();
</script>
</body>
</html>

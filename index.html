  function pwFromName(name){ const m=String(name).match(/(\d{6})(?=\.[^.]+$|\D*$)/); return m?m[1]:null; }

  // 이름·전화 컬럼 인식 키워드 (예매처마다 컬럼명이 달라 넓게 잡음)
  const KW_NAME=["관람자명","예매자명","구매자명","수령자명","수취인명","고객명","주문자명","성명","성함","이름","예매자","구매자","관람자","수령자","수취인","받는분","주문자","회원명","회원","name"];
  const KW_TEL =["연락처","휴대폰번호","휴대폰 번호","핸드폰번호","휴대폰","휴대전화","핸드폰","전화번호","연락번호","수신번호","수신자번호","전화","mobile","phone"];

  const nodesEl=document.getElementById("smsNodes");
  const outputEl=document.getElementById("smsOutput");
  const countEl=document.getElementById("smsCount");
  const dlRow=document.getElementById("smsDownloadRow");
  const dlInfo=document.getElementById("smsDlInfo");

  let nodes=[];   // {id, name, headers, rows, map:{이름,전화}}
  let seq=0;

  const esc=s=>s==null?"":String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const norm=s=>String(s==null?"":s).replace(/\s+/g,"").trim();
  const won=n=>Number(n).toLocaleString("ko-KR");

  // 전화번호 정규화: 숫자만 추출 → 010-XXXX-XXXX 형태로. 중복 판정은 숫자열 기준.
  function normTel(v){
    let digits=String(v==null?"":v).replace(/[^\d]/g,"");
    if(!digits) return {key:"", disp:""};
    // 국가코드 +82 → 0
    if(digits.startsWith("82")) digits="0"+digits.slice(2);
    // 표시용 하이픈
    let disp=digits;
    if(/^01\d{8,9}$/.test(digits)){
      disp = digits.length===11 ? digits.replace(/(\d{3})(\d{4})(\d{4})/,"$1-$2-$3")
                                : digits.replace(/(\d{3})(\d{3})(\d{4})/,"$1-$2-$3");
    } else if(/^0\d{8,10}$/.test(digits)){
      disp = digits.replace(/(\d{2,3})(\d{3,4})(\d{4})$/,"$1-$2-$3");
    }
    return {key:digits, disp};
  }

  function findCol(headers, keywords){
    const lc=s=>norm(s).toLowerCase();
    // 정확 일치 우선 → 부분 포함 (대소문자 무시)
    for(const kw of keywords){ const i=headers.findIndex(h=>lc(h)===lc(kw)); if(i>=0) return i; }
    for(const kw of keywords){ const i=headers.findIndex(h=>lc(h).includes(lc(kw))); if(i>=0) return i; }
    return -1;
  }
  function detectHeaderRow(aoa){
    const lc=s=>norm(s).toLowerCase();
    const score=row=>{ const cells=(row||[]).map(lc); let s=0;
      if(cells.some(c=>KW_NAME.some(k=>c.includes(lc(k))))) s++;
      if(cells.some(c=>KW_TEL.some(k=>c.includes(lc(k))))) s++;
      return s; };
    const lim=Math.min(aoa.length,15); let best=0,bestScore=-1;
    for(let r=0;r<lim;r++){ const s=score(aoa[r]); if(s>bestScore){ bestScore=s; best=r; } }
    return best;
  }
  // 값 패턴으로 전화번호 열 추정: 각 열에서 휴대폰 번호(010 등) 비율이 가장 높은 열
  function guessTelCol(headers, rows){
    if(!rows.length) return -1;
    const sample=rows.slice(0,80);
    let best=-1, bestRatio=0;
    for(let c=0;c<headers.length;c++){
      let hit=0, nonEmpty=0;
      sample.forEach(r=>{
        const raw=String(r[c]==null?"":r[c]).trim();
        if(!raw) return;
        nonEmpty++;
        let d=raw.replace(/[^\d]/g,"");
        if(d.startsWith("82")) d="0"+d.slice(2);
        if(/^01\d{7,8}$/.test(d) || /^0\d{9,10}$/.test(d)) hit++;
      });
      if(nonEmpty>=3){ const ratio=hit/nonEmpty; if(ratio>0.6 && ratio>bestRatio){ bestRatio=ratio; best=c; } }
    }
    return best;
  }
  // 값 패턴으로 이름 열 추정: 한글 2~5자 이름 비율이 높은 열 (전화 열 제외)
  function guessNameCol(headers, rows, telCol){
    if(!rows.length) return -1;
    const sample=rows.slice(0,80);
    let best=-1, bestRatio=0;
    for(let c=0;c<headers.length;c++){
      if(c===telCol) continue;
      let hit=0, nonEmpty=0;
      sample.forEach(r=>{
        const raw=String(r[c]==null?"":r[c]).trim();
        if(!raw) return;
        nonEmpty++;
        if(/^[가-힣]{2,5}$/.test(raw)) hit++;  // 순수 한글 2~5자
      });
      if(nonEmpty>=3){ const ratio=hit/nonEmpty; if(ratio>0.5 && ratio>bestRatio){ bestRatio=ratio; best=c; } }
    }
    return best;
  }
  // 특정 열의 값이 실제 휴대폰 번호 패턴인지 비율 검사
  function telRatio(rows, c){
    if(c<0) return 0;
    const sample=rows.slice(0,80); let hit=0, ne=0;
    sample.forEach(r=>{ const raw=String(r[c]==null?"":r[c]).trim(); if(!raw) return; ne++;
      let d=raw.replace(/[^\d]/g,""); if(d.startsWith("82")) d="0"+d.slice(2);
      if(/^01\d{7,8}$/.test(d) || /^0\d{9,10}$/.test(d)) hit++; });
    return ne>=3 ? hit/ne : 0;
  }
  // 특정 열의 값이 한글 이름 패턴인지 비율 검사
  function nameRatio(rows, c){
    if(c<0) return 0;
    const sample=rows.slice(0,80); let hit=0, ne=0;
    sample.forEach(r=>{ const raw=String(r[c]==null?"":r[c]).trim(); if(!raw) return; ne++;
      if(/^[가-힣]{2,5}$/.test(raw)) hit++; });
    return ne>=3 ? hit/ne : 0;
  }
  // 가장 깨끗한 전화 열: 휴대폰 비율 최고, 동률이면 '-->' 등 잡티 적은 열
  function bestTelCol(headers, rows){
    let best=-1, bestScore=-1;
    for(let c=0;c<Math.max(headers.length, ...rows.map(r=>r.length));c++){
      const ratio=telRatio(rows,c);
      if(ratio<0.6) continue;
      // 잡티(비숫자·비하이픈 문자) 적을수록 가점
      let clean=0, ne=0;
      rows.slice(0,40).forEach(r=>{ const raw=String(r[c]==null?"":r[c]).trim(); if(!raw) return; ne++; if(/^[\d\s\-()]+$/.test(raw)) clean++; });
      const cleanRatio=ne?clean/ne:0;
      const score=ratio*10 + cleanRatio;   // 비율 우선, 깨끗함 보조
      if(score>bestScore){ bestScore=score; best=c; }
    }
    return best;
  }
  // 값이 한글 이름인 열들을 모두 반환 (왼→오 순서)
  function nameCols(headers, rows){
    const cols=[];
    const maxC=Math.max(headers.length, ...rows.map(r=>r.length));
    for(let c=0;c<maxC;c++){ if(nameRatio(rows,c)>=0.5) cols.push(c); }
    return cols;
  }
  // 값이 휴대폰 번호인 열들을 모두 반환 (왼→오 순서)
  function telCols(headers, rows){
    const cols=[];
    const maxC=Math.max(headers.length, ...rows.map(r=>r.length));
    for(let c=0;c<maxC;c++){ if(telRatio(rows,c)>=0.6) cols.push(c); }
    return cols;
  }
  // 전화 열들 중 값이 가장 많이 채워진 열 (비어있는 행이 적은 열 우선)
  function fillCount(rows, c){
    let n=0; rows.forEach(r=>{ if(String(r[c]==null?"":r[c]).trim()) n++; }); return n;
  }
  function parseWorkbook(buf){
    const wb=XLSX.read(buf,{type:"array",cellDates:false});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
    if(!aoa.length) return null;
    const hr=detectHeaderRow(aoa);
    const headers=(aoa[hr]||[]).map(h=>String(h));
    const rows=aoa.slice(hr+1).filter(r=>r && r.some(c=>String(c).trim()!==""));

    const nCols=nameCols(headers,rows);   // 한글 이름 열들
    const tCols=telCols(headers,rows);    // 휴대폰 번호 형태 열들

    // ── 전화 열 선택 ──
    // 1) 헤더가 '휴대폰번호' 등으로 명확하고 그 열 값이 실제 전화면 최우선 (헤더 정렬이 맞는 깔끔한 파일)
    // 2) 아니면 전화 형태 열들 중 '값이 가장 많이 채워진' 열
    //    (예: 휴대폰번호는 다 차 있고 전화번호는 듬성한 경우 → 휴대폰번호 선택)
    let 전화=-1;
    // 헤더 매칭: '예매자' 계열보다 관람/주문 대상자 계열을 우선.
    // '전화번호'(유선) 헤더는 잡지 않음 — 휴대폰번호/연락처(휴대폰이 들어가는 칸)만.
    let hTel=findCol(headers,["관람자연락처","관람연락처","관람자휴대폰","주문자휴대폰","주문자연락처","수령인연락처"]);
    if(hTel<0) hTel=findCol(headers,["휴대폰번호","휴대폰","핸드폰번호","핸드폰"]);
    if(hTel<0) hTel=findCol(headers,["연락처"]);
    if(hTel>=0 && telRatio(rows,hTel)>=0.6){
      전화=hTel;
    } else if(tCols.length){
      // 채움 많은 열 우선, 동률이면 뒤쪽(관람자) 우선
      전화=tCols.slice().sort((a,b)=> (fillCount(rows,b)-fillCount(rows,a)) || (b-a) )[0];
    } else {
      const h=findCol(headers,KW_TEL); if(telRatio(rows,h)>=0.4) 전화=h;
    }

    // ── 이름 열 선택 ──
    // 선택된 전화 열의 '바로 왼쪽'에 가장 가까운 이름 열 (주문자명·관람자명 모두 전화 왼쪽에 붙음)
    // '수신/수신거부' 등 전화보다 오른쪽 한글값이 이름으로 오분류되는 것도 배제됨.
    let 이름=-1;
    if(전화>=0){
      const left=nCols.filter(c=>c<전화);
      if(left.length) 이름=left[left.length-1];
    }
    if(이름<0) 이름 = nCols.length ? nCols[nCols.length-1] : findCol(headers,["관람자명","주문자명","예매자명","구매자명","이름","성명"]);

    return { headers, rows, map:{ 이름, 전화 } };
  }

  // 파일을 읽어 노드로 추가 (드래그/선택 시마다 호출)
  function addFiles(fileList){
    const files=[...fileList].filter(f=>/\.(xls|xlsx)$/i.test(f.name));
    if(!files.length) return;
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=async e=>{
        let bytes=new Uint8Array(e.target.result);
        // 암호화(Agile) 파일이면 복호화 시도: 파일명 YYMMDD → 실패 시 직접 입력
        if(OfficeCrypto.isEncrypted(bytes)){
          let pw=pwFromName(file.name);
          let dec=null, lastErr="";
          for(let attempt=0;attempt<4;attempt++){
            if(!pw){ pw=prompt(`'${file.name}'\n암호가 걸린 파일입니다. 암호를 입력해 주세요${lastErr?` (${lastErr})`:""}:`); if(pw==null){ return; } }
            try{ dec=await OfficeCrypto.decrypt(bytes.buffer,pw); break; }
            catch(err){ lastErr=err.message||"복호화 실패"; pw=null; }
          }
          if(!dec){ const node={ id:++seq, name:file.name, headers:[], rows:[], map:{이름:-1,전화:-1}, error:true, errMsg:"암호 해제 실패" }; nodes.push(node); render(); recompute(); return; }
          bytes=dec;
        }
        const parsed=parseWorkbook(bytes);
        const node={ id:++seq, name:file.name, headers:[], rows:[], map:{이름:-1,전화:-1}, error:false };
        if(!parsed){ node.error=true; }
        else { node.headers=parsed.headers; node.rows=parsed.rows; node.map=parsed.map; }
        nodes.push(node);
        render(); recompute();
      };
      reader.readAsArrayBuffer(file);
    });
  }
  function removeNode(id){ nodes=nodes.filter(n=>n.id!==id); render(); recompute(); }

  function render(){
    nodesEl.innerHTML="";
    nodes.forEach((n,i)=>{
      const node=document.createElement("div");
      node.className="node";
      node.style.marginTop=i>0?"8px":"0";
      node.innerHTML=`<div class="sms-row">
          <div class="ch-drop loaded" style="flex:1"><span>✓ ${esc(n.name)}</span></div>
          <button class="node-del" title="제거">✕</button>
        </div><div class="ch-info"></div>`;
      const info=node.querySelector(".ch-info");
      node.querySelector(".node-del").addEventListener("click",()=>removeNode(n.id));

      if(n.error){
        info.innerHTML=`<span style="color:#c0392b">⚠ ${esc(n.errMsg||"읽을 데이터가 없습니다.")}</span>`;
      }else{
        const okName=n.map.이름>=0, okTel=n.map.전화>=0;
        if(okName && okTel){
          info.innerHTML=`<span style="color:#2e7d32">✓ 이름·전화 인식됨</span> · ${won(n.rows.length)}행`;
        }else{
          info.innerHTML=`<span style="color:#c0392b">⚠ ${!okName?"이름":""}${(!okName&&!okTel)?"·":""}${!okTel?"전화":""} 컬럼을 지정해 주세요</span>`;
          const mk=(label,key)=>{
            const sel=document.createElement("select");
            sel.style.cssText="margin-left:6px;font-size:11.5px;padding:2px 4px;border:1px solid #ddd;border-radius:5px";
            sel.innerHTML=`<option value="-1">${label}(없음)</option>`+n.headers.map((h,idx)=>`<option value="${idx}" ${n.map[key]===idx?"selected":""}>${esc(h||("열"+(idx+1)))}</option>`).join("");
            sel.addEventListener("change",()=>{ n.map[key]=parseInt(sel.value,10); render(); recompute(); });
            return sel;
          };
          const wrap=document.createElement("div"); wrap.style.marginTop="6px";
          wrap.appendChild(mk("이름","이름")); wrap.appendChild(mk("전화","전화"));
          info.appendChild(wrap);
        }
      }
      nodesEl.appendChild(node);
    });
  }

  // 전체 추합 + 전화번호 기준 중복 제거
  let lastResult=[];
  function recompute(){
    const seen=new Set();
    const out=[];
    nodes.forEach(n=>{
      if(n.error || n.map.전화<0) return;
      n.rows.forEach(r=>{
        const tel=normTel(r[n.map.전화]);
        if(!tel.key) return;              // 전화번호 없으면 제외
        if(seen.has(tel.key)) return;     // 전화번호 기준 중복 제거 (먼저 나온 것 유지)
        seen.add(tel.key);
        const name = n.map.이름>=0 ? String(r[n.map.이름]==null?"":r[n.map.이름]).trim() : "";
        out.push({ 이름:name, 전화:tel.disp });
      });
    });
    out.sort((a,b)=>String(a.이름).localeCompare(String(b.이름),"ko"));
    lastResult=out;
    renderOutput();
  }

  function renderOutput(){
    const anyLoaded=nodes.length>0;
    if(!anyLoaded){ outputEl.innerHTML='<div class="empty">파일을 넣으면 이름·전화번호가 자동으로 추출됩니다.</div>'; countEl.textContent=""; dlRow.style.display="none"; return; }
    if(!lastResult.length){
      outputEl.innerHTML='<div class="warn">추출된 전화번호가 없습니다. 각 파일에서 전화 컬럼이 올바르게 지정됐는지 확인해 주세요.</div>';
      countEl.textContent=""; dlRow.style.display="none"; return;
    }
    const noTelName=lastResult.filter(x=>!x.이름).length;
    countEl.textContent=`· 중복 제거 후 ${won(lastResult.length)}명`;
    const preview=lastResult.slice(0,50);
    let html=`<div class="table-scroll" style="max-height:420px;overflow:auto"><table>
      <tr><th style="width:48px">#</th><th>이름</th><th>전화번호</th></tr>`;
    preview.forEach((x,i)=>{ html+=`<tr><td>${i+1}</td><td>${esc(x.이름)||'<span style="color:#bbb">(이름 없음)</span>'}</td><td>${esc(x.전화)}</td></tr>`; });
    html+=`</table></div>`;
    if(lastResult.length>50) html+=`<div style="font-size:12px;color:#999;margin-top:6px">미리보기 50명 표시 · 전체 ${won(lastResult.length)}명은 다운로드 파일에 포함됩니다.</div>`;
    if(noTelName) html+=`<div class="warn">이름이 비어있는 항목 ${won(noTelName)}건이 있습니다. (전화번호는 포함됨)</div>`;
    outputEl.innerHTML=html;
    dlRow.style.display="flex";
    dlInfo.innerHTML=`총 <b>${won(lastResult.length)}명</b>`;
  }

  // 다운로드: txt (한 줄에 "이름 전화번호")
  function dlTxt(){
    if(!lastResult.length) return;
    const lines=lastResult.map(x=>(x.이름 ? x.이름+" "+x.전화 : x.전화));
    const blob=new Blob([lines.join("\r\n")],{type:"text/plain;charset=utf-8"});
    triggerDownload(blob, fname("txt"));
  }
  // 다운로드: 엑셀 (이름·전화번호 2열)
  function dlXlsx(){
    if(!lastResult.length) return;
    const aoa=[["이름","전화번호"], ...lastResult.map(x=>[x.이름, x.전화])];
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws["!cols"]=[{wch:14},{wch:18}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"문자발송명단");
    XLSX.writeFile(wb, fname("xlsx"));
  }
  function fname(ext){
    const d=new Date(); const p=n=>String(n).padStart(2,"0");
    return `문자발송명단_${won(lastResult.length)}명_${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}.${ext}`;
  }
  function triggerDownload(blob, filename){
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download=filename;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },100);
  }

  // 상시 드롭존: 드래그/선택 시마다 파일 추가
  const smsDrop=document.getElementById("smsDrop");
  const smsInput=document.getElementById("smsFileInput");
  smsInput.addEventListener("change",e=>{ if(e.target.files.length) addFiles(e.target.files); smsInput.value=""; });
  ["dragenter","dragover"].forEach(ev=>smsDrop.addEventListener(ev,e=>{ e.preventDefault(); smsDrop.classList.add("hover"); }));
  ["dragleave","drop"].forEach(ev=>smsDrop.addEventListener(ev,e=>{ e.preventDefault(); smsDrop.classList.remove("hover"); }));
  smsDrop.addEventListener("drop",e=>{ e.preventDefault(); if(e.dataTransfer.files.length) addFiles(e.dataTransfer.files); });

  document.getElementById("smsDlTxt").addEventListener("click",dlTxt);
  document.getElementById("smsDlXlsx").addEventListener("click",dlXlsx);
})();

</script>
</body>
</html>
